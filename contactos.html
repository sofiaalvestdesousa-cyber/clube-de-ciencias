<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos – Clube de Ciências</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contactos-mapa iframe {
            width: 100%;
            height: 350px;
            border: none;
            display: block;
            margin: 0;
            border-radius: 0;
        }
 
        .contactos-secao {
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
        }
 
        .contactos-secao h2 {
            font-size: 1.6rem;
            letter-spacing: 4px;
            color: #111;
            margin-bottom: 10px;
            padding: 0;
        }
 
        .contactos-divisor {
            width: 40px;
            height: 3px;
            background-color: #184b97;
            margin: 0 auto 24px;
        }
 
        .contactos-info {
            margin-bottom: 28px;
            line-height: 1.9;
            font-size: 0.95rem;
            color: #222;
            text-align: center;
        }
 
        .contactos-info a {
            color:  #184b97;
            text-decoration: none;
        }
 
        .contactos-info a:hover {
            text-decoration: underline;
        }
 
        .contactos-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
 
        .contactos-form input,
        .contactos-form textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: Arial, sans-serif;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
 
        .contactos-form input:focus,
        .contactos-form textarea:focus {
            border-color: #184A97;
        }
 
        .contactos-form textarea {
            height: 160px;
            resize: vertical;
        }
 
        .contactos-form button {
            align-self: flex-end;
            padding: 12px 36px;
            background-color: #111;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin: 0;
        }
 
        .contactos-form button:hover {
            background-color: #184A97;
        }
    </style>
</head>
<body>
 
    <header>
        <div class="header-logos">
            <img class="header-logo-big" src="https://static.wixstatic.com/media/84aa27_1329227193a94bfcb627adb0ab74349f~mv2.jpg/v1/crop/x_176,y_22,w_996,h_964/fill/w_176,h_169,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/Logo%20%2BCI%C3%8ANCI_CAM%C3%95ES.jpg%22 alt="+CIÊNCI@CAMÕES">
            <div class="header-logo-group">
                <img class="header-logo-camoes" src="images/camoes-logo.png" alt="Logótipo Camões">
                <img class="header-logo-small" src="https://static.wixstatic.com/media/84aa27_b7e06445a7f24d79b6b297065c42c593~mv2.png/v1/fill/w_212,h_88,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/logo_CCV.png%22 alt="Clube Ciência Viva">
            </div>
        </div>
        <h1><strong>CLUBE DE CIÊNCIAS</strong></h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="nos.html">Nós</a>
            <a href="Mapa.html">Mapa</a>
            <a href="Projetos.html">Projetos</a>
            <a href="contactos.html">Contactos</a>
        </nav>
    </header>
 
    <main style="padding: 0;">
 
        <!-- MAPA GOOGLE -->
        <div class="contactos-mapa">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d673.4883981926822!2d-9.143257631463014!3d38.73006025949916!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd19339e5eb3f663%3A0x246b99c4d0dfef6e!2sPra%C3%A7a%20Jos%C3%A9%20Fontana%2C%201050-129%20Lisboa!5e0!3m2!1spt-PT!2spt!4v1774429599844!5m2!1spt-PT!2spt%22
                allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
 
        <!-- FORMULÁRIO -->
        <div class="contactos-secao">
            <h2>CONTACTOS</h2>
            <div class="contactos-divisor"></div>
 
            <div class="contactos-info">
                <p><strong>Email:</strong> <a href="mailto:maiscienciacamoes@gmail.com">maiscienciacamoes@gmail.com</a></p>
                <p><strong>Endereço:</strong><br>
                Escola Secundária de Camões<br>
                Praça José Fontana</p>
            </div>
 
            <form class="contactos-form"
                  action="https://formsubmit.co/maiscienciacamoes@gmail.com"
                  method="POST">
 
                <!-- Opções FormSubmit -->
                <input type="hidden" name="_subject" value="Nova mensagem do site – Clube de Ciências">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="obrigado.html">
 
                <input type="text"  name="nome"     placeholder="Nome"                    required>
                <input type="email" name="email"    placeholder="Email"                   required>
                <textarea           name="mensagem" placeholder="Digite sua mensagem aqui..." required></textarea>
                <button type="submit">Enviar</button>
            </form>
        </div>
 
    </main>
 
    <footer>
        <p>© 2024 Clube de Ciências · +CIÊNCI@CAMÕES</p>
    </footer>
 
</body>
</html>
