<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mapa da Escola</title>
 
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
 
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    /* O header usa o estilo do style.css do site */
 
    .page-wrap {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 16px 32px;
    }
 
    /* ── TÍTULO ── */
    .map-header {
      text-align: center;
      margin-bottom: 18px;
    }
    .map-header h2 {
      font-size: 2rem;
      font-weight: 800;
      color: #111;
      margin-bottom: 6px;
    }
    .map-header p {
      font-size: 1.05rem;
      font-weight: 700;
      color: #333;
    }
 
    /* ── CONTAINER DO MAPA ── */
    .map-container {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      border: 2px solid #dde0e6;
      height: 520px;
      position: relative;
    }
 
    #map {
      width: 100%;
      height: 100%;
    }
 
    /* ── MARCADOR TEARDROP ── */
    .pin-wrap {
      position: relative;
      width: 30px;
      height: 42px;
      cursor: pointer;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,0.3));
      transition: transform 0.15s;
    }
    .pin-wrap:hover { transform: scale(1.15) translateY(-3px); }
    .pin-wrap.active { filter: drop-shadow(0 3px 6px rgba(0,0,0,0.4)); }
 
    .pin-svg { width: 100%; height: 100%; }
 
    /* ── POPUP CARD (estilo azul escuro como na imagem) ── */
    .leaflet-popup-content-wrapper {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      padding: 0 !important;
      border-radius: 0 !important;
    }
    .leaflet-popup-tip-container { display: none !important; }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }
 
    .popup-card {
      background: #1a3a6b;
      border: 3px solid #1a3a6b;
      border-radius: 12px;
      width: 240px;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      animation: popIn 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.75) translateY(8px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
 
    .popup-header {
      background: #1a3a6b;
      padding: 10px 12px 8px;
    }
    .popup-title {
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }
 
    .popup-img-wrap {
  width: 100%;
  height: 130px;
  overflow: hidden;
  background: #eee;
  line-height: 0;        /* ← adicionar */
  font-size: 0;          /* ← adicionar */
}
.popup-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  margin: 0 !important;  /* ← adicionar */
  padding: 0 !important; /* ← adicionar */
}
    .popup-img-wrap img {
  margin: 0 !important;
  padding: 0 !important;
  border: none !important;
}
    .popup-img-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #c8d8f0, #a0b8e0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
 
    .popup-body {
      background: #fff;
      padding: 10px 12px 12px;
    }
    .popup-desc {
      font-size: 0.83rem;
      font-weight: 700;
      color: #222;
      line-height: 1.5;
      margin-bottom: 10px;
    }
    .popup-link {
      display: inline-block;
      font-size: 0.83rem;
      font-weight: 700;
      color: #1a5bbf;
      text-decoration: underline;
      cursor: pointer;
      transition: color 0.15s;
    }
    .popup-link:hover { color: #0e3a8a; }
 
    /* Leaflet overrides */
    .leaflet-control-zoom a {
      font-family: 'Nunito', sans-serif !important;
      font-weight: 800 !important;
    }
    .leaflet-control-attribution {
      font-size: 10px !important;
    }
  </style>
</head>
<body>
 
<header>
  <div class="header-logos">
    <img class="header-logo-big"
         src="https://static.wixstatic.com/media/84aa27_1329227193a94bfcb627adb0ab74349f~mv2.jpg/v1/crop/x_176,y_22,w_996,h_964/fill/w_176,h_169,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/Logo%20%2BCI%C3%8ANCI_CAM%C3%95ES.jpg"
         alt="+CIÊNCI@CAMÕES">
    <div class="header-logo-group">
      <img class="header-logo-camoes" src="images/camoes-logo.png" alt="Logótipo Camões">
      <img class="header-logo-small"
           src="https://static.wixstatic.com/media/84aa27_b7e06445a7f24d79b6b297065c42c593~mv2.png/v1/fill/w_212,h_88,al_c,q_85,usm_0.66_1.00_0.01,enc_avif,quality_auto/logo_CCV.png"
           alt="Clube Ciência Viva">
    </div>
  </div>
 
  <h1><strong>CLUBE DE CIÊNCIAS</strong></h1>
 
  <nav>
    <a href="index.html">Home</a>
    <a href="nos.html">Nós</a>
    <a href="Mapa.html">Mapa</a>
    <a href="Projetos.html">Projetos</a>
    <a href="contactos.html">Contactos</a>
  </nav>
</header>
 
<div class="page-wrap">
  <div class="map-header">
    <h2>Mapa da Escola</h2>
    <p>Veja onde encontrar nossas atividades!</p>
  </div>
 
  <div class="map-container">
    <div id="map"></div>
  </div>
</div>
 
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════
   CONFIGURAÇÃO DO MAPA
   Altere center, zoom e bounds para a sua escola.
═══════════════════════════════════════════════════ */
const MAP_CONFIG = {
  center: [38.73025737221408, -9.14309438594601],   // Escola Secundária Camões, Lisboa
  zoom: 17,
  minZoom: 16,
  maxZoom: 19,
  bounds: [
    [38.72613741652267, -9.147059776939257],
    [38.7390838287942, -9.135732308228691]
  ]
};
 
/* ═══════════════════════════════════════════════════
   PONTOS — edite à vontade!
   foto: URL da imagem ou null para usar emoji
   link: URL da página interna (ou URL completo)
═══════════════════════════════════════════════════ */
const PONTOS = [
  {
    id: 1,
    lat: 38.730811519668954,  
    lng: -9.142744345325752,
    titulo: "Hotel de Abelha",
    descricao: "Um hotel de abelha feito para abelhas solitárias fazerem seus ninhos.",
    foto: "images/Hotel Frente.jpg",
    emoji: "🐝",
    link: "projeto-hotel-de-abelhas.html",
    linkTexto: "Saiba + do projeto"
  },
  {
    id: 2,
    lat: 38.73075901214268,
    lng: -9.142658897783175,
    titulo: "Jardim Aromático",
    descricao: "Espaço verde para aprender sobre plantas e biodiversidade local.",
    foto: "images/Jardim capa.jpeg",
    emoji: "🌱",
    link: "projeto-jardim.html",
    linkTexto: "Saiba + do projeto"
  },
  {
    id: 3,
    lat: 38.73029061249952,
    lng: -9.142813041616563,
    titulo: "Sala do Clube",
    descricao: "Sala onde o clube realiza as suas atividades.",
    foto: null,
    emoji: "♻️",
    link: "projeto-ratinhos.html",
    linkTexto: "Saiba + do projeto"
  },
  {
    id: 4,
    lat: 38.73050021988111,
    lng: -9.142655022858824,
    titulo: "Bebedouro de Pássaros",
    descricao: "Bebedouro para pássaros se hidratarem.",
    foto: "images/Bebedouro frente.png",
    emoji: "☀️",
    link: "projeto-bebedouro-para-passaros.html",
    linkTexto: "Saiba + do projeto"
  },
  {
    id: 5,
    lat: 38.73084347368264,
    lng: -9.143545952896327,
    titulo: "Casa de Pássaros",
    descricao: "Casa para abrigar pássaros.",
    foto: null,
    emoji: "🌤️",
    link: "projeto-casa-de-passaros.html",
    linkTexto: "Saiba + do projeto"
  }
];
 
/* ═══════════════════════════════════════
   INICIALIZAR MAPA (tiles claros)
═══════════════════════════════════════ */
const map = L.map('map', {
  center: MAP_CONFIG.center,
  zoom: MAP_CONFIG.zoom,
  minZoom: MAP_CONFIG.minZoom,
  maxZoom: MAP_CONFIG.maxZoom,
  maxBounds: MAP_CONFIG.bounds,
  maxBoundsViscosity: 1.0
});
 
// Tiles claros — idêntico ao estilo da imagem
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a> &copy; OpenStreetMap',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);
 
/* ═══════════════════════════════════════
   SVG TEARDROP — verde e azul escuro
═══════════════════════════════════════ */
function makePin(color) {
  // Teardrop shape igual ao Google Maps
  return `
    <svg class="pin-svg" viewBox="0 0 30 42" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 0C7.268 0 1 6.268 1 14c0 9.941 14 28 14 28S29 23.941 29 14C29 6.268 22.732 0 15 0z"
            fill="${color}" stroke="#fff" stroke-width="2"/>
      <circle cx="15" cy="14" r="5.5" fill="#fff" opacity="0.9"/>
    </svg>`;
}
 
const GREEN  = '#4caf50';
const BLUE   = '#1a3a6b';
 
/* ═══════════════════════════════════════
   CRIAR MARCADORES
═══════════════════════════════════════ */
let activeId = null;
const markerMap = {};
 
PONTOS.forEach(ponto => {
  const div = document.createElement('div');
  div.className = 'pin-wrap';
  div.innerHTML = makePin(GREEN);
  div.id = `pin-${ponto.id}`;
 
  const icon = L.divIcon({
    className: '',
    html: div.outerHTML,
    iconSize: [30, 42],
    iconAnchor: [15, 42],
    popupAnchor: [0, -46]
  });
 
  const marker = L.marker([ponto.lat, ponto.lng], { icon }).addTo(map);
  markerMap[ponto.id] = marker;
 
  // Conteúdo popup
  const imgHTML = ponto.foto
    ? `<div class="popup-img-wrap"><img class="popup-img" src="${ponto.foto}" alt="${ponto.titulo}"
         onerror="this.parentElement.innerHTML='<div class=popup-img-placeholder>${ponto.emoji}</div>'"></div>`
    : `<div class="popup-img-wrap"><div class="popup-img-placeholder">${ponto.emoji}</div></div>`;
 
  const popupHTML = `
    <div class="popup-card">
      <div class="popup-header">
        <div class="popup-title">${ponto.titulo}</div>
      </div>
      ${imgHTML}
      <div class="popup-body">
        <p class="popup-desc">${ponto.descricao}</p>
        <a class="popup-link" href="${ponto.link}" target="_blank">${ponto.linkTexto}</a>
      </div>
    </div>`;
 
  marker.bindPopup(popupHTML, {
    closeButton: false,
    maxWidth: 260,
    className: 'custom-popup'
  });
 
  // Abrir → azul escuro
  marker.on('popupopen', () => {
    // Resetar anterior
    if (activeId && activeId !== ponto.id) {
      const prev = document.getElementById(`pin-${activeId}`);
      if (prev) prev.querySelector('.pin-svg path').setAttribute('fill', GREEN);
      document.getElementById(`pin-${activeId}`)?.classList.remove('active');
    }
    const pin = document.getElementById(`pin-${ponto.id}`);
    if (pin) {
      pin.querySelector('.pin-svg path').setAttribute('fill', BLUE);
      pin.classList.add('active');
    }
    activeId = ponto.id;
  });
 
  // Fechar → volta ao verde
  marker.on('popupclose', () => {
    const pin = document.getElementById(`pin-${ponto.id}`);
    if (pin) {
      pin.querySelector('.pin-svg path').setAttribute('fill', GREEN);
      pin.classList.remove('active');
    }
    if (activeId === ponto.id) activeId = null;
  });
});
</script>
